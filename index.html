  <h1>ミニレポート 4E 07 川勝瑛真</h1>
  <h3>内容</h3>
  <h2>・オープンデータとはなにか</h2>　　オープンデータとは、政府や公共機関、企業などが持つデータを誰でも使えるように公開することである。<br>
       　公開されたデータは、研究やビジネス、社会貢献などに活用される。<br>
      　 メリットとして、行政の透明性が高まり、市民が政府の活動を確認しやすくなることや、新しいサービス・ビジネスの創出につながることがある。<br>
       　一方で、個人情報やセキュリティへの配慮、データの品質や更新頻度の管理も重要とされている。</p>
